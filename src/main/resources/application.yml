spring:
  application:
    name: order-state-machine

  datasource:
    url: jdbc:postgresql://localhost:5432/order_state_machine
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: order-state-machine-group-v3
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.statemachine.infrastructure.kafka.dto"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    listener:
      ack-mode: batch

logging:
  level:
    com.example.statemachine: INFO
    org.springframework.statemachine: DEBUG
    org.apache.kafka: INFO
    org.springframework.kafka: INFO
    org.hibernate: INFO

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

spring.statemachine:
  jpa:
    enabled: true

# DB-Scheduler 配置
db-scheduler:
  enabled: true
  threads: 5
  polling-interval: 5s
  heartbeat-interval: 1m
  immediate-execution-enabled: true
  polling-strategy: lock-and-fetch
  create-table: true
  table-name: scheduled_tasks

spring:
  datasource:
    url: jdbc:tc:postgresql:16:///testdb
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    packages-to-scan: com.example.statemachine.infrastructure.persistence.entity

  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    consumer:
      group-id: order-state-machine-test-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

spring.statemachine:
  jpa:
    enabled: true
  data:
    jpa:
      repositories:
        enabled: true

order:
  validation:
    timeout-minutes: 10
    max-retries: 3

db-scheduler:
  enabled: false

logging:
  level:
    root: WARN
    com.example.statemachine: DEBUG
    org.springframework.statemachine: INFO
    org.springframework.data: DEBUG
